name: Android Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  emulator-test:
    name: Android Emulator Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Run Emulator + Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          avd-name: pixel_6_pro_api_35
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -memory 2048
          script: |
            adb install app-debug.apk
            adb shell pm grant online.db1k.safering.android.debug \
              android.permission.READ_PHONE_STATE \
              android.permission.POST_NOTIFICATIONS \
              android.permission.READ_SMS \
              android.permission.RECEIVE_SMS
            adb shell am start -n \
              online.db1k.safering.android.debug/online.db1k.safering.android.MainActivity
            sleep 5
            adb shell uiautomator dump
            adb shell cat /sdcard/window_dump.xml | grep -c "SafeRing"
            echo "=== Android smoke test complete ==="
