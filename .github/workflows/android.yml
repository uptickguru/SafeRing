# SafeRing — Android CI/CD
# Builds the Android app and distributes to Firebase App Distribution.
#
# Triggers:
#   - push to main
#   - pull requests targeting main
#
# Secrets required (set in GitHub repo settings):
#   FIREBASE_SERVICE_ACCOUNT — JSON key for Firebase service account
#
# The Firebase App Distribution Gradle plugin is already configured in
# android/app/build.gradle.kts (release build type).

name: Android Build & Firebase Distribution

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Upload to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" | base64 --decode > /tmp/firebase-service-account.json
          echo "FIREBASE_SERVICE_ACCOUNT=/tmp/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/safering-keystore.jks \
            -alias safering \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass kailey99 \
            -keypass kailey99 \
            -dname "CN=SafeRing, OU=SafeRing, O=GMG, L=NYC, S=NY, C=US" \
            -noprompt
          echo "Keystore generated at: $(ls -la android/safering-keystore.jks | awk '{print $5}')"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ../safering-keystore.jks
          KEYSTORE_PASSWORD: kailey99
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Distribute to Firebase App Distribution
        continue-on-error: true
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: /tmp/firebase-service-account.json
        run: |
          cd android
          ./gradlew appDistributionUploadRelease --no-daemon
