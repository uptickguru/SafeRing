# SafeRing iOS CI/CD — Builds & uploads to TestFlight
name: iOS Build & TestFlight Upload

on:
  push:
    branches: [main]

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install xcodegen v2.45.4
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip" -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcgen
          cd /tmp/xcgen/xcodegen && bash install.sh
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install distribution certificate
        env:
          IOS_DIST_CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          security create-keychain -p "tempchain" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "tempchain" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$IOS_DIST_CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$IOS_DIST_CERT_PASS" -k build.keychain -T /usr/bin/codesign -T /usr/bin/xcodebuild
          rm /tmp/cert.p12
          security list-keychains -d user -s build.keychain

      - name: Install provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          for p in *.mobileprovision; do
            [ -f "$p" ] && cp "$p" ~/Library/MobileDevice/Provisioning\ Profiles/
          done

      - name: Install ASC API key (for TestFlight upload)
        env:
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          base64 --decode <<< "$ASC_KEY_B64" > ~/private_keys/AuthKey_392Z3XJZQS.p8

      - name: Set build number
        run: |
          agvtool new-version -all ${{ github.run_number }}
          agvtool what-version

      - name: Archive app (unsigned)
        run: |
          rm -rf /tmp/SafeRingDD
          xcodebuild \
            -project SafeRing.xcodeproj \
            -scheme SafeRing \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath /tmp/SafeRingDD \
            -archivePath /tmp/SafeRing.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=legacy

      - name: Export IPA
        working-directory: .
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/SafeRing.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath /tmp/SafeRingIPA \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=53DRV2V873 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Kevin Asbury (53DRV2V873)" \
            PROVISIONING_PROFILE_SPECIFIER="Gus - store-SafeRing- app"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeRing-ipa
          path: /tmp/SafeRingIPA/SafeRing.ipa
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ ! -f /tmp/SafeRingIPA/SafeRing.ipa ]; then
            echo "SKIP: No IPA"
            exit 0
          fi
          xcrun altool --upload-app \
            -f /tmp/SafeRingIPA/SafeRing.ipa \
            --type ios \
            --apiKey 392Z3XJZQS \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose
