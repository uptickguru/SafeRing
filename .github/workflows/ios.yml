# SafeRing iOS CI/CD — Builds & uploads to TestFlight
name: iOS Build & TestFlight Upload

on:
  push:
    branches: [main]

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install xcodegen v2.45.4
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip" -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcgen
          cd /tmp/xcgen/xcodegen && bash install.sh
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install ASC API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.fastlane
          base64 --decode <<< "$ASC_API_KEY_BASE64" > ~/.fastlane/AppStoreConnect.p8
          echo "ASC key: $(wc -c < ~/.fastlane/AppStoreConnect.p8) bytes"

      - name: Install Fastlane
        run: brew install fastlane

      - name: Build & Upload to TestFlight via Fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        working-directory: ios
        run: fastlane beta

      - name: Upload IPA artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SafeRing-ipa
          path: ios/SafeRing.ipa
          retention-days: 14
          if-no-files-found: ignore
