# SafeRing iOS CI/CD — Builds & uploads to TestFlight
name: iOS Build & TestFlight Upload

on:
  push:
    branches: [main]

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install xcodegen v2.45.4
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip" -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcgen
          cd /tmp/xcgen/xcodegen && bash install.sh
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install ASC API key from secret
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          if [ -n "$ASC_API_KEY_BASE64" ]; then
            echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
            echo "ASC API key installed"
          else
            echo "WARNING: ASC_API_KEY_BASE64 secret not set"
          fi

      - name: Archive app
        run: |
          xcodebuild \
            -project SafeRing.xcodeproj \
            -scheme SafeRing \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath /tmp/SafeRing.xcarchive \
            archive \
            DEVELOPMENT_TEAM=53DRV2V873 \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            SWIFT_STRICT_CONCURRENCY=legacy

      - name: Export IPA
        working-directory: .
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/SafeRing.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath /tmp/SafeRingIPA \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeRing-ipa
          path: /tmp/SafeRingIPA/SafeRing.ipa
          retention-days: 14

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ]; then
            echo "SKIP: ASC_KEY_ID or ASC_ISSUER_ID not set"
            exit 0
          fi
          xcrun altool --upload-app \
            -f /tmp/SafeRingIPA/SafeRing.ipa \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose
