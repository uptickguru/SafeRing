# SafeRing iOS CI/CD — Builds & uploads to TestFlight
name: iOS Build & TestFlight Upload

on:
  push:
    branches: [main]

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-self-hosted
    timeout-minutes: 30

    env:
      PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          echo "Xcode: $(xcode-select -p)"
          xcodebuild -version

      - name: Install xcodegen v2.45.4
        run: |
          curl -sL "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip" -o /tmp/xcodegen.zip
          unzip -q -o /tmp/xcodegen.zip -d /tmp/xcgen
          /tmp/xcgen/xcodegen/bin/xcodegen --version

      - name: Generate Xcode project
        run: /tmp/xcgen/xcodegen/bin/xcodegen generate

      - name: Copy provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          for p in *.mobileprovision; do
            [ -f "$p" ] && cp "$p" ~/Library/MobileDevice/Provisioning\ Profiles/
          done

      - name: Install ASC API key
        env:
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          base64 --decode <<< "$ASC_KEY_B64" > ~/private_keys/AuthKey_392Z3XJZQS.p8

      - name: Import certificate and configure keychain
        env:
          IOS_DIST_CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN=~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "kailey99" "$KEYCHAIN"
          security set-keychain-settings -t 7200 -u "$KEYCHAIN"
          echo "$IOS_DIST_CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$IOS_DIST_CERT_PASS" -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/xcodebuild -A
          rm /tmp/cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "kailey99" "$KEYCHAIN"

      - name: Set build number
        run: |
          agvtool new-version -all ${{ github.run_number }}
          agvtool what-version

      - name: Archive app
        run: |
          rm -rf /tmp/SafeRingDD
          xcodebuild \
            -project SafeRing.xcodeproj \
            -scheme SafeRing \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath /tmp/SafeRingDD \
            -archivePath /tmp/SafeRing.xcarchive \
            archive \
            DEVELOPMENT_TEAM=53DRV2V873 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Kevin Asbury (53DRV2V873)" \
            PROVISIONING_PROFILE_SPECIFIER="Gus - store-SafeRing- app" \
            -allowProvisioningUpdates \
            SWIFT_STRICT_CONCURRENCY=legacy

      - name: Export IPA
        working-directory: .
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/SafeRing.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath /tmp/SafeRingIPA \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeRing-ipa
          path: /tmp/SafeRingIPA/SafeRing.ipa
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ ! -f /tmp/SafeRingIPA/SafeRing.ipa ]; then
            echo "SKIP: No IPA"
            exit 0
          fi
          xcrun altool --upload-app \
            -f /tmp/SafeRingIPA/SafeRing.ipa \
            --type ios \
            --apiKey *** \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose
