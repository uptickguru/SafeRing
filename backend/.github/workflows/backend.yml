name: Backend Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build + Vet
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build server
        run: go build ./cmd/server/

      - name: Build scraper-agent
        run: go build ./cmd/scraper-agent/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... 2>&1 || true
