name: SafeRing Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'

env:
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  ANDROID_SDK_TOOLS: 9477386

jobs:
  build:
    name: Build APK / AAB
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build release AAB (unsigned)
        run: ./gradlew :app:bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

      # Distribute to Firebase App Distribution (Android TestFlight equivalent)
      - name: Distribute to Firebase App Distribution (debug)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
            ./gradlew :app:assembleDebug :app:appDistributionUploadDebug \
              -PfirebaseServiceAccount=/tmp/firebase-sa.json
            echo "✅ Distributed to Firebase App Distribution (debug)"
          else
            echo "⚠️ FIREBASE_SERVICE_ACCOUNT_JSON not set — skipping distribution"
          fi

      - name: Distribute to Firebase App Distribution (release)
        if: github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
            ./gradlew :app:bundleRelease :app:appDistributionUploadRelease \
              -PfirebaseServiceAccount=/tmp/firebase-sa.json
            echo "✅ Distributed to Firebase App Distribution (release)"
          else
            echo "⚠️ FIREBASE_SERVICE_ACCOUNT_JSON not set — skipping distribution"
          fi

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Run lint
        run: ./gradlew :app:lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Run unit tests
        run: ./gradlew :app:test
